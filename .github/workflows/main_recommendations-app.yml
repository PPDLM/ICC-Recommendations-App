name: Build and deploy Node.js app to Azure Web App - recommendations-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Fixes the deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: npm install and build
        run: |
          npm install
          npm run build --if-present

      - name: Clean up ghost files
        run: find . -name "*#*" -delete

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # This ensures we grab the contents, not the root folder itself
          path: . 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          # CRITICAL: Download into the current directory
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BF7CCA07ABA943E39C434C68106211FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8E077DD7D07349569CC6EAA695F9FCF0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_18BD1CF0EA4744D1BF0C8B43D5155FB0 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'recommendations-app'
          # This tells Azure the code is in the current root
          package: .