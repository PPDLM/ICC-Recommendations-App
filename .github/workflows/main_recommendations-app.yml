name: Build and deploy Node.js app to Azure Web App - recommendations-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      # NEW: This step deletes any accidental files/folders created with comments in their names
      - name: Clean up accidental files with invalid characters
        run: |
          find . -name "*#*" -delete
          find . -name "*(*" -delete

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules
            !*.md

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BF7CCA07ABA943E39C434C68106211FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8E077DD7D07349569CC6EAA695F9FCF0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_18BD1CF0EA4744D1BF0C8B43D5155FB0 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'recommendations-app'
          slot-name: 'Production'
          package: .